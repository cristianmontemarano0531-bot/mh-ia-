<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>MH Control de Stock</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.4}
  body{min-height:100vh;min-height:100dvh;padding-bottom:120px}
  .app{max-width:640px;margin:0 auto;background:#f1f5f9;min-height:100vh}

  /* Header */
  header{position:sticky;top:0;z-index:30;background:#fff;color:#0f172a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e8f0}
  .brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:18px}
  .brand-mark{width:72px;height:42px;border-radius:8px;background:#000;display:grid;place-items:center;padding:4px;overflow:hidden;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .brand-mark img{width:100%;height:100%;object-fit:contain;display:block}
  .brand-text{display:flex;flex-direction:column;line-height:1.1}
  .brand-text .b1{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#64748b}
  .brand-text .b2{font-size:18px;font-weight:700}
  .op-chip{display:flex;align-items:center;gap:8px;background:#f1f5f9;border:1px solid #e2e8f0;color:#0f172a;padding:8px 12px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  .op-chip:active{background:#e2e8f0}

  /* Search */
  .search-wrap{position:sticky;top:60px;z-index:20;background:#f1f5f9;padding:12px 16px;border-bottom:1px solid #e2e8f0}
  .search-input{width:100%;padding:14px 16px 14px 44px;border:1px solid #cbd5e1;background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>") no-repeat 14px center;border-radius:12px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
  .search-input:focus{border-color:#0f172a;box-shadow:0 0 0 3px rgba(15,23,42,.10)}

  /* Search results */
  .results{padding:0 16px 8px;max-height:60vh;overflow-y:auto}
  .result-item{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-top:8px;cursor:pointer;transition:transform .08s, border-color .15s}
  .result-item:active{transform:scale(.98);border-color:#0f172a}
  .result-info{min-width:0;flex:1}
  .result-code{font-weight:700;font-size:14px;color:#0f172a;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .result-color{display:inline-block;background:#0f172a;color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;letter-spacing:.3px}
  .result-color.no-color{background:#94a3b8}
  .result-desc{font-size:13px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .result-add{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#f0fdf4;color:#16a34a;border:1.5px solid #16a34a;display:grid;place-items:center;font-size:22px;font-weight:600}
  .stock-chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;letter-spacing:.3px;color:#fff}
  .stock-chip.has{background:#15803d}
  .stock-chip.zero{background:#b91c1c}
  .stock-chip.unknown{background:#94a3b8}
  .results-empty{text-align:center;color:#64748b;padding:24px 16px;font-size:14px}
  .results-hint{text-align:center;color:#94a3b8;padding:8px 16px 0;font-size:13px}

  /* Section title */
  .section-title{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 8px}
  .section-title h2{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:#475569;font-weight:700}
  .section-title .count{font-size:13px;color:#64748b}

  /* Cart */
  .cart{padding:0 16px}
  .cart-empty{background:#fff;border:1px dashed #cbd5e1;border-radius:12px;padding:32px 16px;text-align:center;color:#64748b;font-size:14px}
  .cart-empty .icon{font-size:32px;margin-bottom:8px;opacity:.5}

  .row{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.03);animation:slideIn .25s ease-out}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .row-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
  .row-meta{flex:1;min-width:0}
  .row-code{font-weight:700;font-size:15px;color:#0f172a;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .row-desc{font-size:13px;color:#64748b;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .row-remove{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:transparent;border:0;color:#94a3b8;font-size:20px;cursor:pointer;font-family:inherit}
  .row-remove:active{background:#fee2e2;color:#dc2626}

  .counter{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px}
  .btn-circle{width:52px;height:52px;border-radius:50%;border:0;font-size:28px;font-weight:700;cursor:pointer;font-family:inherit;display:grid;place-items:center;transition:transform .08s, box-shadow .15s;-webkit-tap-highlight-color:transparent}
  .btn-circle:active{transform:scale(.92)}
  .btn-minus{background:#fef2f2;color:#dc2626;box-shadow:inset 0 0 0 2px #fecaca}
  .btn-minus:active{background:#fee2e2}
  .btn-plus{background:#f0fdf4;color:#16a34a;box-shadow:inset 0 0 0 2px #bbf7d0}
  .btn-plus:active{background:#dcfce7}
  .qty{flex:1;text-align:center;font-size:32px;font-weight:700;color:#0f172a;font-variant-numeric:tabular-nums;min-width:60px}
  .qty.neg{color:#dc2626}
  .qty.pos{color:#16a34a}
  .qty-tag{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:#94a3b8;margin-top:2px}
  .qty-tag.neg{color:#dc2626}
  .qty-tag.pos{color:#16a34a}


  /* Bottom bar */
  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:14px 16px calc(14px + env(safe-area-inset-bottom));z-index:40;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
  .bottom-inner{max-width:640px;margin:0 auto}
  .btn-confirm{width:100%;background:#0f172a;color:#fff;border:0;border-radius:14px;padding:18px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s}
  .btn-confirm:active{background:#000}
  .btn-confirm:disabled{background:#cbd5e1;cursor:not-allowed}
  .btn-confirm .badge{background:rgba(255,255,255,.22);padding:2px 10px;border-radius:999px;font-size:14px}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;padding:0}
  .modal-overlay.show{display:flex;animation:fadeIn .2s}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:640px;padding:24px 20px calc(24px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;animation:slideUp .25s ease-out}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal h3{margin:0 0 4px;font-size:20px}
  .modal .sub{color:#64748b;font-size:14px;margin-bottom:20px}
  .op-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .op-btn{padding:16px;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:12px;font-size:16px;font-weight:600;color:#0f172a;cursor:pointer;font-family:inherit;transition:transform .08s}
  .op-btn:active{transform:scale(.96);background:#0f172a;color:#fff;border-color:#0f172a}

  .summary-list{margin:8px 0 16px;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
  .summary-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #f1f5f9;font-size:14px}
  .summary-row:last-child{border-bottom:0}
  .summary-info{min-width:0;flex:1}
  .summary-code{font-weight:700;font-size:14px}
  .summary-meta{font-size:12px;color:#64748b}
  .summary-qty{font-weight:700;font-variant-numeric:tabular-nums;font-size:16px;flex-shrink:0;margin-left:12px}
  .summary-qty.pos{color:#16a34a}
  .summary-qty.neg{color:#dc2626}
  .modal-actions{display:flex;gap:10px;margin-top:16px}
  .btn-secondary{flex:1;padding:14px;background:#f1f5f9;border:0;border-radius:12px;font-size:15px;font-weight:600;color:#475569;cursor:pointer;font-family:inherit}
  .btn-secondary:active{background:#e2e8f0}
  .btn-primary{flex:2;padding:14px;background:#0f172a;color:#fff;border:0;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-primary:active{background:#000}

  /* Toast */
  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:14px 20px;border-radius:12px;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:200;display:none;animation:toastIn .25s}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}
  .toast.show{display:block}
</style>
</head>

    <button id="opChip" class="op-chip">
      <span>👤</span><span id="opName">Elegir</span>
    </button>
  </header>

  <div class="search-wrap">
    <input id="search" class="search-input" type="search" inputmode="search" autocomplete="off" placeholder="Buscar por código, nombre o color...">
  </div>

  <div id="results" class="results"></div>

  <div class="section-title">
    <h2>En esta carga</h2>
    <span id="cartCount" class="count">0 variantes</span>
  </div>
  <div id="cart" class="cart">
    <div class="cart-empty"><div class="icon">🛒</div>Buscá un producto arriba para agregarlo</div>
  </div>

</div>

<div class="bottom-bar">
  <div class="bottom-inner">
    <button id="btnConfirm" class="btn-confirm" disabled>
      <span>✓ Confirmar carga</span>
      <span id="confirmBadge" class="badge" style="display:none">0</span>
    </button>
  </div>
</div>

<!-- Modal: elegir operario -->
<div id="opModal" class="modal-overlay">
  <div class="modal">
    <h3>¿Quién sos?</h3>
    <div class="sub">Esto queda guardado en este celular. Podés cambiarlo después.</div>
    <div id="opGrid" class="op-grid"></div>
  </div>
</div>

<!-- Modal: confirmar -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal">
    <h3>Confirmar movimientos</h3>
    <div class="sub" id="confirmSub">Se van a registrar las siguientes filas:</div>
    <div id="summaryList" class="summary-list"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-primary" onclick="doConfirm()">Confirmar y enviar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const OPERARIOS = ["Juan","Tizi","Marcos","Cristian","Agustín","Lucas","Germán","Julián","Miguel"];
  let PRODUCTOS = [];

  const cart = new Map();
  let operario = localStorage.getItem("mh_operario") || null;

  /* --- Operario --- */
  function renderOpModal(){
    const grid = document.getElementById("opGrid");
    grid.innerHTML = OPERARIOS.map(n => `<button class="op-btn" onclick="setOp('${n}')">${n}</button>`).join("");
  }
  function setOp(name){
    operario = name;
    localStorage.setItem("mh_operario", name);
    document.getElementById("opName").textContent = name;
    document.getElementById("opModal").classList.remove("show");
  }
  function openOpModal(){ document.getElementById("opModal").classList.add("show"); }
  document.getElementById("opChip").onclick = openOpModal;

  /* --- Búsqueda --- */
  function variantId(p){ return [p.codigo, p.color||"", p.talle||""].join("|"); }
  function norm(s){ return (s||"").toString().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,""); }

  function search(query){
    const q = norm(query).trim();
    if(!q) return [];
    const tokens = q.split(/\s+/).filter(Boolean);
    const scored = [];
    for(const p of PRODUCTOS){
      const hay = norm([p.codigo, p.producto, p.color, p.talle, p.subrubro].join(" "));
      if(tokens.every(t => hay.includes(t))){
        let score = 0;
        if(norm(p.codigo).startsWith(q)) score += 10;
        if(norm(p.codigo).includes(q)) score += 5;
        if(p.color && norm(p.color).includes(q)) score += 3;
        scored.push([score, p]);
      }
    }
    scored.sort((a,b)=>b[0]-a[0]);
    return scored.slice(0,30).map(x=>x[1]);
  }

  function renderResults(query){
    const wrap = document.getElementById("results");
    if(!query.trim()){ wrap.innerHTML=""; return; }
    const hits = search(query);
    if(hits.length===0){
      wrap.innerHTML = `<div class="results-empty">Sin resultados para "${escape(query)}"</div>`;
      return;
    }
    const limited = hits.slice(0,8);
    wrap.innerHTML = limited.map(p=>{
      const id = variantId(p);
      const inCart = cart.has(id);
      const colorChip = p.color ? `<span class="result-color">${escape(p.color)}</span>` :
                                  `<span class="result-color no-color">SIN COLOR</span>`;
      const talleChip = (p.talle && p.talle.toUpperCase() !== "UNICO") ? `<span class="result-color" style="background:#475569">${escape(p.talle)}</span>` : "";
      return `
        <div class="result-item" onclick="addVariant('${id.replace(/'/g,"\\'")}')">
          <div class="result-info">
            <div class="result-code">${escape(p.codigo)} ${colorChip} ${talleChip} ${stockChip(p)}</div>
            <div class="result-desc">${escape(cleanDesc(p.producto))}</div>
          </div>
          <div class="result-add" style="${inCart?'background:#0f172a;color:#fff;border-color:#0f172a':''}">${inCart?'✓':'+'}</div>
        </div>`;
    }).join("") + (hits.length>8 ? `<div class="results-hint">+ ${hits.length-8} resultados más, refiná la búsqueda</div>` : "");
  }
  document.getElementById("search").addEventListener("input", e=>renderResults(e.target.value));

  /* --- Cart --- */
  function addVariant(id){
    const p = PRODUCTOS.find(x => variantId(x) === id);
    if(!p) return;
    if(cart.has(id)){
      // Si ya está, scroll suave al row
      document.getElementById("row-"+cssId(id))?.scrollIntoView({behavior:"smooth",block:"center"});
      flash("row-"+cssId(id));
    } else {
      cart.set(id, {producto:p, qty:0});
    }
    renderCart();
    // Limpiar buscador y resultados
    document.getElementById("search").value = "";
    document.getElementById("results").innerHTML = "";
  }
  function cssId(id){ return id.replace(/[^a-z0-9]/gi,"_"); }
  function flash(elId){
    const el = document.getElementById(elId);
    if(!el) return;
    el.style.transition = "background .4s";
    el.style.background = "#fef9c3";
    setTimeout(()=> el.style.background = "#fff", 400);
  }
  function changeQty(id, delta){
    const item = cart.get(id);
    if(!item) return;
    item.qty += delta;
    renderCart();
  }
  function removeItem(id){
    cart.delete(id);
    renderCart();
  }

  function renderCart(){
    const wrap = document.getElementById("cart");
    const cnt = document.getElementById("cartCount");
    cnt.textContent = `${cart.size} variante${cart.size===1?"":"s"}`;

    if(cart.size===0){
      wrap.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div>Buscá un producto arriba para agregarlo</div>`;
    } else {
      wrap.innerHTML = [...cart.entries()].map(([id, item])=>{
        const p = item.producto;
        const colorChip = p.color ? `<span class="result-color">${escape(p.color)}</span>` :
                                    `<span class="result-color no-color">SIN COLOR</span>`;
        const talleChip = (p.talle && p.talle.toUpperCase() !== "UNICO") ? `<span class="result-color" style="background:#475569">${escape(p.talle)}</span>` : "";
        const q = item.qty;
        const qClass = q>0?"pos":(q<0?"neg":"");
        const qTag = q>0?'<span class="qty-tag pos">ENTRADA</span>'
                   :q<0?'<span class="qty-tag neg">SALIDA</span>'
                   :'<span class="qty-tag">sin cambio</span>';
        return `
          <div id="row-${cssId(id)}" class="row">
            <div class="row-head">
              <div class="row-meta">
                <div class="row-code">${escape(p.codigo)} ${colorChip} ${talleChip} ${stockChip(p)}</div>
                <div class="row-desc">${escape(cleanDesc(p.producto))}</div>
              </div>
              <button class="row-remove" onclick="removeItem('${id.replace(/'/g,"\\'")}')">×</button>
            </div>
            <div class="counter">
              <button class="btn-circle btn-minus" onclick="changeQty('${id.replace(/'/g,"\\'")}',-1)">−</button>
              <div>
                <div class="qty ${qClass}">${q>0?'+':''}${q}</div>
                ${qTag}
              </div>
              <button class="btn-circle btn-plus" onclick="changeQty('${id.replace(/'/g,"\\'")}',1)">+</button>
            </div>
          </div>`;
      }).join("");
    }

    // Botón confirmar
    const btn = document.getElementById("btnConfirm");
    const badge = document.getElementById("confirmBadge");
    const movs = [...cart.values()].filter(i=>i.qty!==0).length;
    btn.disabled = movs===0;
    badge.style.display = movs>0 ? "" : "none";
    badge.textContent = movs;
  }

  /* --- Confirm --- */
  document.getElementById("btnConfirm").onclick = ()=>{
    const movs = [...cart.entries()].filter(([_,i])=>i.qty!==0);
    if(movs.length===0) return;
    const list = document.getElementById("summaryList");
    list.innerHTML = movs.map(([id,item])=>{
      const p = item.producto;
      const meta = [p.color, (p.talle && p.talle.toUpperCase()!=="UNICO") ? p.talle : null].filter(Boolean).join(" · ") || "sin variante";
      const sign = item.qty>0?"+":"";
      const tag = item.qty>0?"ENTRADA":"SALIDA";
      return `
        <div class="summary-row">
          <div class="summary-info">
            <div class="summary-code">${escape(p.codigo)} <span style="color:#64748b;font-weight:400;font-size:12px">· ${escape(tag)}</span></div>
            <div class="summary-meta">${escape(meta)}</div>
          </div>
          <div class="summary-qty ${item.qty>0?'pos':'neg'}">${sign}${item.qty}</div>
        </div>`;
    }).join("");
    document.getElementById("confirmSub").textContent = `${movs.length} fila${movs.length===1?"":"s"} se van a registrar en el Sheet:`;
    document.getElementById("confirmModal").classList.add("show");
  };
  function closeConfirm(){ document.getElementById("confirmModal").classList.remove("show"); }
  async function doConfirm(){
    const movs = [...cart.entries()].filter(([_,i])=>i.qty!==0);
    if(movs.length===0){ closeConfirm(); return; }
    const items = movs.map(([id,it])=>({
      codigo: it.producto.codigo,
      color:  it.producto.color || "",
      talle:  it.producto.talle || "",
      producto: cleanDesc(it.producto.producto),
      qty: it.qty
    }));
    const btn = document.querySelector("#confirmModal .btn-primary");
    btn.disabled = true; btn.textContent = "Enviando...";
    try {
      const r = await fetch("/control/api/movimientos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ operario, items })
      });
      const data = await r.json();
      if(!r.ok || !data.ok) throw new Error(data.error || ("HTTP "+r.status));
      closeConfirm();
      showToast("✓ "+data.filasAgregadas+" movimientos registrados (carga "+data.idCarga+")");
      cart.clear();
      renderCart();
      // Refrescar stock para reflejar el cambio (aunque el stock real solo se actualiza
      // cuando vos importas el CSV a Dux y la sync corre — este refresh es por las dudas)
      cargarProductos();
    } catch(e){
      showToast("⚠ Error: " + e.message, true);
    } finally {
      btn.disabled = false; btn.textContent = "Confirmar y enviar";
    }
  }
  function showToast(msg, isError){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.background = isError ? "#dc2626" : "#16a34a";
    t.classList.add("show");
    setTimeout(()=> t.classList.remove("show"), isError ? 4000 : 2200);
  }

  function stockChip(p){
    if(p.stock==null) return '<span class="stock-chip unknown">STOCK —</span>';
    const cls = p.stock>0 ? "has" : "zero";
    return '<span class="stock-chip '+cls+'">STOCK '+p.stock+'</span>';
  }
  function cleanDesc(s){
    return (s==null?"":String(s)).replace(/\s+UNICO\b/gi, "").replace(/\s{2,}/g, " ").trim();
  }
  function escape(s){
    return (s==null?"":String(s)).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  /* Init */
  async function cargarProductos(){
    try {
      const r = await fetch("/control/api/productos");
      const data = await r.json();
      if(!r.ok || !data.ok) throw new Error(data.error || ("HTTP "+r.status));
      PRODUCTOS = data.productos || [];
      // Si hay query activa, re-renderizar resultados con los nuevos datos
      const q = document.getElementById("search").value;
      if(q) renderResults(q);
      // Actualizar chips de stock en filas del carrito si las hay
      if(cart.size > 0){
        for(const [id, item] of cart.entries()){
          const fresh = PRODUCTOS.find(p => variantId(p) === id);
          if(fresh) item.producto = fresh;
        }
        renderCart();
      }
    } catch(e){
      console.error("Error cargando productos:", e);
      showToast("⚠ No se pudo cargar el catálogo: " + e.message, true);
    }
  }

  renderOpModal();
  if(operario){
    document.getElementById("opName").textContent = operario;
  } else {
    openOpModal();
  }
  renderCart();
  cargarProductos();
  // Refresca el stock cada 5 minutos (el cron de Dux corre cada 60 min,
  // pero refrescamos más seguido para no quedarnos con datos viejos durante
  // una sesión larga de descarga)
  setInterval(cargarProductos, 5 * 60 * 1000);
</script>
</body>
</html>
